<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEGA Canvas — Holographic Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Background star field -->
    <canvas id="bg-canvas"></canvas>

    <!-- Overlays -->
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <!-- Top bar -->
    <div class="top-bar">
      <div class="logo">VE<span>GA</span></div>
      <div class="top-bar-info">
        <span><span class="label">SYSTEM</span> <span class="status-dot"></span>ONLINE</span>
        <span><span class="label">OPERATOR</span> <span id="operator-name">--</span></span>
        <span><span class="label">UPLINK</span> <span>ACTIVE</span></span>
        <button id="btn-logoff" style="font-family:var(--font-display);font-size:9px;letter-spacing:2px;padding:4px 14px;background:rgba(255,50,100,0.1);border:1px solid rgba(255,50,100,0.3);border-radius:2px;color:rgba(255,50,100,0.7);cursor:pointer;transition:all 0.2s;text-transform:uppercase;margin-left:10px;" onmouseover="this.style.background='rgba(255,50,100,0.25)';this.style.borderColor='rgba(255,50,100,0.6)';this.style.color='#ff3366'" onmouseout="this.style.background='rgba(255,50,100,0.1)';this.style.borderColor='rgba(255,50,100,0.3)';this.style.color='rgba(255,50,100,0.7)'">LOGOFF</button>
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <span>VEGA Advanced Interface System — Active</span>
      <span>DATA STREAM: SECURE</span>
    </div>

    <!-- Workspace for windows -->
    <div class="workspace" id="workspace"></div>

    <script src="js/starfield.js"></script>
    <script>initStarfield('bg-canvas');</script>
    <script src="js/app.js"></script>
</body>
</html>
